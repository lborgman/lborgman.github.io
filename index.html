<!DOCTYPE html>
<html lang="en">
<style>
    #app-container {
        nooutline: 4px dotted red;
        display: flex;
        flex-wrap: wrap;
        gap: 20px;

        .app {
            position: relative;
            nooutline: 4px dotted green;

            figure {
                display: inline-block;
                margin: 0px;
                padding: 8px;
                border: 2px solid lightgray;
                border-radius: 8px;

                img {
                    width: 60px;
                }
            }

            .description {
                display: none;
            }

            .opener {
                cursor: pointer;
                nobackground-color: red;
                opacity: 0.2;
                padding: 1px;
                position: absolute;
                left: 0px;
                top: 0px;
                width: 100%;
                height: 100%;
            }

            .closer {
                display: none;
                cursor: pointer;
                position: absolute;
                right: 0px;
                top: 0px;
                width: 32px;
                aspect-ratio: 1/ 1;
                background-color: #0001;
                justify-content: center;
                align-items: center;
            }
        }

        .app.opened {
            padding: 15px;
            border-radius: 8px;
            background-color: #71bace33;
            .opener {
                display: none;
            }

            .description {
                display: unset;
            }

            .closer {
                display: flex;

            }
        }
    }
</style>
<script type="module">
    // @ts-check
    // alert("here");

    // The {} make JsDoc coloring appear??
    {

        /** @typedef {any} DynamicStringObject */

        /**
         * @typedef {Object} App
         * @property {string} name
         * @property {string} url

        ];

        const eltAppContainer = mkElt("p");
        eltAppContainer.id = "app-container";
        document.body.appendChild(eltAppContainer);

        apps.forEach(app => {
            console.log({ app });
            const eltOpener = mkElt("div");
            eltOpener.classList.add("opener");
            const eltCloser = mkElt("div", undefined, "🗙");
            eltCloser.classList.add("closer");
            const eltDesc = mkElt("div", undefined, app.description);
            eltDesc.classList.add("description");
            const eltApp = mkElt("div", undefined, [
                mkElt("figure", undefined, [
                    mkElt("img", { src: app.logo }),
                    mkElt("figcaption", undefined, app.name)
                ]),
                eltDesc,
                eltOpener,
                eltCloser
            ]);
            eltApp.classList.add("app");
            eltAppContainer.appendChild(eltApp);
            eltOpener.addEventListener("click", evt => {
                evt.stopPropagation();
                eltApp.classList.add("opened");
            });
            eltCloser.addEventListener("click", evt => {
                evt.stopPropagation();
                eltApp.classList.remove("opened");
            });
        });

        /**
         * @param {string} type 
         * @param {DynamicStringObject} [attrib]
         * @param {string|string[]|HTMLElement|HTMLElement[]} [inner]
         * @returns {HTMLElement}
         */
        function mkElt(type, attrib, inner) {
            const elt = document.createElement(type);

            /**
             * 
             * @param {HTMLElement | HTMLElement[] | string | string[]} inr 
             */
            function addInner(inr) {
                if (inr instanceof Element) {
                    elt.appendChild(inr);
                } else {
                    const txt = document.createTextNode(inr.toString());
                    elt.appendChild(txt);
                }
            }
            if (inner) {
                if (Array.isArray(inner) && inner.length && typeof inner != "string") {
                    for (var i = 0; i < inner.length; i++)
                        if (inner[i])
                            addInner(inner[i]);
                } else
                    addInner(inner);
            }
            for (var x in attrib) {
                elt.setAttribute(x, attrib[x]);
            }
            return elt;
        }
    }
